name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

env:
  ACR_NAME: containerregistry0011
  APP_NAME: container-app
  RESOURCE_GROUP: RG-1
  IMAGE_NAME: python-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install flake8 pytest
          pip install -r app/requirements.txt

      # Lint Step
      - name: Lint code
        run: |
          flake8 app --max-line-length=120

      # Unit Test Step
      - name: Run tests
        run: |
          pytest

      # Login to Azure
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # Build Docker Image
      - name: Build Docker image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} ./app

      # Push Docker Image
      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      # Deploy to Container App
      - name: Deploy to Container App
        run: |
          az containerapp update \
          --name $APP_NAME \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}